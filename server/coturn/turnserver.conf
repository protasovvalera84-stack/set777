# Meshlink - Coturn TURN Server Configuration
# Templated by setup.sh. Do not edit __PLACEHOLDERS__ manually.

# Network
listening-port=3478
tls-listening-port=5349
external-ip=__SERVER_HOST__
min-port=49152
max-port=49172

# Authentication
use-auth-secret
static-auth-secret=__TURN_SECRET__
realm=__SERVER_NAME__

# Logging (output to stdout for Docker)
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli
no-tlsv1
no-tlsv1_1

# Performance
total-quota=100
stale-nonce=600

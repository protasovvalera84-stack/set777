# Meshlink Nginx Configuration

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=synapse_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=synapse_register:10m rate=3r/s;

# --- HTTP -> HTTPS redirect ---
server {
    listen 80 default_server;
    server_name _;

    # Health check available on HTTP for Docker healthchecks
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS server ---
server {
    listen 443 ssl default_server;
    server_name _;

    # TLS certificates (generated by setup.sh)
    ssl_certificate     /etc/nginx/ssl/meshlink.crt;
    ssl_certificate_key /etc/nginx/ssl/meshlink.key;

    # Modern TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    client_max_body_size 50m;

    # --- Meshlink UI (main interface) ---
    location / {
        root /usr/share/nginx/www/meshlink;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Fallback web client ---
    location /element/ {
        proxy_pass http://element:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /element {
        return 301 /element/;
    }

    # --- Meshlink API ---
    location /_matrix {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support for sync
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # --- Media downloads (allow large files, no buffering) ---
    location /_matrix/media {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 300s;
        client_max_body_size 50m;
    }

    # --- Server discovery ---
    location /.well-known/matrix/ {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Admin API ---
    location /_synapse {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Admin Panel UI ---
    location /admin/ {
        proxy_pass http://synapse-admin:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location = /admin {
        return 301 /admin/;
    }

    # --- Rate limiting for login/register ---
    location /_matrix/client/v3/login {
        limit_req zone=synapse_login burst=10 nodelay;
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /_matrix/client/v3/register {
        limit_req zone=synapse_register burst=10 nodelay;
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Meshlink Admin Config Panel ---
    location = /config {
        proxy_pass http://admin-api:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://admin-api:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Platform installers ---
    location /installers/ {
        alias /usr/share/nginx/www/installers/;
        autoindex off;
    }

    # --- Health check ---
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
